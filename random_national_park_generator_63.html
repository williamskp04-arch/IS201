
<style>
  :root {
    --bg: #f7f9fb;
    --card-bg: #ffffff;
    --border: #d9d9d9;
    --text-main: #222;
    --text-secondary: #666;
    --accent: #2a7ae2;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Card */
  .park-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .park-name {
    font-size: 24px;
    font-weight: 600;
    margin: 0.25rem 0 0;
    color: var(--text-main);
  }

  .park-location {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0;
  }

  .fact {
    font-size: 15px;
    color: var(--text-secondary);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }

  .fact:last-child {
    border-bottom: none;
  }

  .badge {
    display: inline-block;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 8px;
    background: #e8f1ff;
    color: #2a7ae2;
    margin-bottom: 6px;
    font-weight: 500;
  }

  /* Button */
  .roll-btn {
    width: 100%;
    max-width: 600px;
    padding: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #f0f4f8;
    color: var(--text-main);
    transition: 0.15s;
    margin-top: 1rem;
  }

  .roll-btn:hover {
    background: #e4e9ef;
  }

  .roll-btn:active {
    transform: scale(0.98);
  }

  .counter {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 8px;
  }

  .empty-state {
    color: var(--text-secondary);
    font-size: 16px;
    text-align: center;
    padding: 2rem 0;
  }
</style>

<h2 class="sr-only">Random National Park Generator</h2>

<div id="card" class="park-card">
  <p class="empty-state">Press Roll to discover a random national park!</p>
</div>

<button class="roll-btn" onclick="roll()">Roll</button>
<p class="counter" id="counter"></p>

let rollCount = 0;
let lastIndex = -1;

function roll() {
  let idx;
  do { idx = Math.floor(Math.random() * parks.length); } while (idx === lastIndex && parks.length > 1);
  lastIndex = idx;
  rollCount++;
  const p = parks[idx];
  document.getElementById('card').innerHTML = `
    <div>
      <span class="badge">Park #${idx + 1} of ${parks.length}</span>
      <p class="park-name">${p.name}</p>
      <p class="park-location">${p.location}</p>
    </div>
    <div>
      ${p.facts.map(f => `<p class="fact">${f}</p>`).join('')}
    </div>
  `;
  document.getElementById('counter').textContent = `Roll ${rollCount} — ${parks.length} parks in the pool`;
}
</script>
